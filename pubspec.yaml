name: kuryente_check
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # UI & Design
  cupertino_icons: ^1.0.8
  google_fonts: ^7.0.0
  lucide_icons: ^0.257.0
  flutter_map: ^8.2.2
  latlong2: ^0.9.1

  # State Management & Routing
  flutter_riverpod: ^3.1.0
  go_router: ^17.0.1

  # Firebase & Auth
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  cloud_firestore: ^6.1.1

  # Utilities
  intl: ^0.20.2
  shared_preferences: ^2.5.4
  flutter_local_notifications: ^19.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  build_runner: ^2.10.5
  mockito: ^5.6.3

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#0F4C45"
  image: "assets/images/logo.png"
  android_12:
    color: "#0F4C45"
    image: "assets/images/logo.png"
  web: false

flutter:
  uses-material-design: true
  assets:
    - assets/images/
